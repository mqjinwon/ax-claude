# AX Skill Routing — canonical skill per category
# Used by /ax to recommend the right skill without ambiguity.
#
# 2-tier strategy:
#   1st: keyword regex match (deterministic) — complex keywords first
#   2nd: LLM semantic fallback if no match
#
# Fields:
#   canonical:            leaf skill for direct/partial invocation
#   orchestrator:         full pipeline orchestrator (when user wants end-to-end)
#   aliases:              other skills that do similar things
#   trigger:              keywords → recommend canonical
#   orchestrator_trigger: keywords → recommend orchestrator instead
#   hidden:               skills excluded from /ax recommendations (still callable directly)
#
# Orchestration hierarchy (do NOT use as canonical unless noted):
#   research-pipeline       full research: idea-discovery → experiment-bridge → auto-review-loop
#   idea-discovery          idea: research-lit → idea-creator → novelty-check → research-review
#   idea-discovery-robot    robotics version of idea-discovery
#   experiment-bridge       plan → implement code → deploy → collect results
#   auto-review-loop        loop: codex-review → implement-fixes → re-review
#   paper-writing           paper-plan → paper-figure → paper-write → paper-compile → improvement
#   rebuttal                parse reviews → draft rebuttal → manage follow-up rounds
#   research-refine-pipeline research-refine + experiment-plan chained
#   gstack-autoplan         gstack-plan-ceo-review + design + eng review, auto-decisions
#   gstack-land-and-deploy  merge PR → wait CI → verify via canary (runs after gstack-ship)
#   oh-my-claudecode:autopilot   full autonomous execution from idea to working code
#   oh-my-claudecode:ultrawork   parallel execution engine for multi-task completion
#   oh-my-claudecode:ralph  self-referential loop until task completion

# ── Hidden skills ────────────────────────────────────────────────────────────
# These are excluded from /ax routing recommendations.
# Users can still invoke them directly (e.g. /comm-lit-review).
hidden:
  # Domain-specific (not general use)
  - comm-lit-review         # communications domain only
  # Fun/unrelated
  - pixel-art               # unrelated to research workflow
  # gstack internal utilities (not user-facing workflows)
  - gstack-canary           # monitoring daemon, called by gstack-land-and-deploy
  - gstack-setup-deploy     # one-time deploy config, not a workflow
  - gstack-setup-browser-cookies  # web automation setup utility
  - gstack-connect-chrome   # web automation setup utility
  - gstack-upgrade          # gstack self-upgrade; user should run /gstack-upgrade explicitly
  - gstack                  # headless browser daemon, internal utility
  - gstack-browse           # alias for gstack daemon
  - gstack-benchmark        # web perf benchmarking, gstack-internal
  - gstack-codex            # OpenAI Codex CLI wrapper, specialized
  - gstack-health           # code quality dashboard; use gstack-review for PR review
  # Team/safety modes (not for solo use)
  - gstack-retro            # weekly team retro
  - gstack-cso              # Chief Security Officer mode, team use
  - gstack-guard            # full safety mode, team use
  - gstack-careful          # destructive command warnings, team use
  - gstack-freeze           # directory-scoped edit restriction, team use
  - gstack-unfreeze         # clears freeze boundary, team use
  # Internal research pipeline components (called by orchestrators, not users directly)
  - feishu-notify           # internal notification utility (Chinese-specific)
  - auto-paper-improvement-loop   # called internally by paper-writing orchestrator
  - auto-review-loop-minimax      # specialized variant; use auto-review-loop instead
  - research-review         # called internally by idea-discovery orchestrator


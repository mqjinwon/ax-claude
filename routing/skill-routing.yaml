      - "automate"

  ship_deploy:
    # gstack-ship: git ship workflow — merge base, run tests, bump VERSION,
    #              update CHANGELOG, push, create PR
    # gstack-land-and-deploy: after ship — merge PR, wait CI, verify via canary
    canonical: gstack-ship
    orchestrator: gstack-land-and-deploy
    aliases:
      - autoresearch:autoresearch:ship
    trigger:
